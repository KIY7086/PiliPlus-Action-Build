name: Build PiliPlus with custom package name

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone PiliPlus
        run: |
          git clone --depth=1 https://github.com/bggRGjQaUbCoE/PiliPlus.git

      - name: Replace package name
        run: |
          cd PiliPlus
          OLD_PKG="com.example.piliplus"
          NEW_PKG="tv.danmaku.bili"
          GRADLE_FILE="android/app/build.gradle.kts"

          echo "🔄 replacing: $OLD_PKG → $NEW_PKG"

          sed -i \
            -e "s|applicationId = \"$OLD_PKG\"|applicationId = \"$NEW_PKG\"|g" \
            -e "s|namespace = \"$OLD_PKG\"|namespace = \"$NEW_PKG\"|g" \
            "$GRADLE_FILE"

          find android -name "AndroidManifest.xml" \
            -exec sed -i "s|$OLD_PKG|$NEW_PKG|g" {} \;

          find android \( -name "*.kt" -o -name "*.java" \) \
            | xargs -r sed -i \
                -e "s|package $OLD_PKG|package $NEW_PKG|g" \
                -e "s|import $OLD_PKG|import $NEW_PKG|g"

          OLD_PATH=$(echo "$OLD_PKG" | tr '.' '/')
          NEW_PATH=$(echo "$NEW_PKG" | tr '.' '/')
          for SRC_ROOT in \
              android/app/src/main/kotlin \
              android/app/src/main/java \
              android/app/src/debug/kotlin \
              android/app/src/debug/java; do
            if [ -d "$SRC_ROOT/$OLD_PATH" ]; then
              mkdir -p "$SRC_ROOT/$NEW_PATH"
              mv "$SRC_ROOT/$OLD_PATH/"* "$SRC_ROOT/$NEW_PATH/" 2>/dev/null || true
              rm -rf "$SRC_ROOT/com"
            fi
          done

          find android -name "*.xml" \
            | xargs -r sed -i "s|$OLD_PKG|$NEW_PKG|g"

          sed -i "s|$OLD_PKG|$NEW_PKG|g" pubspec.yaml

          echo "✅ result:"
          grep -E "applicationId|namespace" "$GRADLE_FILE"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: |
          cd PiliPlus
          flutter pub get

      - name: Build APK
        run: |
          cd PiliPlus
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --no-tree-shake-icons

      - name: Verify APK package name
        run: |
          AAPT=$(find $ANDROID_HOME/build-tools -name "aapt" | sort -V | tail -1)
          $AAPT dump badging \
            PiliPlus/build/app/outputs/flutter-apk/app-release.apk \
            | grep "^package:"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlus-tv.danmaku.bili
          path: PiliPlus/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          cd PiliPlus
          echo "version=$(grep '^version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.version.outputs.date }}"
          name: "PiliPlus ${{ steps.version.outputs.version }} | tv.danmaku.bili"
          body: |
            自动构建，包名已改为 `tv.danmaku.bili`
            上游版本：${{ steps.version.outputs.version }}
            ⚠️ 与官方哔哩哔哩包名相同，安装前请先卸载官方版本
          files: PiliPlus/build/app/outputs/flutter-apk/app-release.apk
