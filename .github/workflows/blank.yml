name: Build PiliPlus with custom package name

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      upstream_sha: ${{ steps.compare.outputs.upstream_sha }}
    steps:
      - name: Check upstream commit
        id: compare
        run: |
          UPSTREAM_SHA=$(git ls-remote https://github.com/bggRGjQaUbCoE/PiliPlus.git HEAD | cut -f1)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          LAST_SHA=""
          if git ls-remote --exit-code --tags \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
              "last-built-sha" > /dev/null 2>&1; then
            LAST_SHA=$(git ls-remote \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
              "refs/tags/last-built-sha" | cut -f1)
            LAST_SHA=$(git ls-remote \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
              "refs/tags/last-built-sha" \
              | awk '{print $1}')
          fi

          # Read stored SHA from a release tag message instead
          STORED_SHA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/last-built-sha" \
            | jq -r '.body // ""' | tr -d '[:space:]')

          echo "upstream: $UPSTREAM_SHA"
          echo "stored:   $STORED_SHA"

          if [ "$UPSTREAM_SHA" = "$STORED_SHA" ]; then
            echo "Ō£ģ no new commits, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "­¤åĢ new commits detected, proceeding with build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Clone PiliPlus
        run: |
          git clone --depth=1 https://github.com/bggRGjQaUbCoE/PiliPlus.git

      - name: Replace package name
        run: |
          cd PiliPlus
          OLD_PKG="com.example.piliplus"
          NEW_PKG="tv.danmaku.bili"
          GRADLE_FILE="android/app/build.gradle.kts"

          echo "­¤öä replacing: $OLD_PKG ŌåÆ $NEW_PKG"

          sed -i \
            -e "s|applicationId = \"$OLD_PKG\"|applicationId = \"$NEW_PKG\"|g" \
            -e "s|namespace = \"$OLD_PKG\"|namespace = \"$NEW_PKG\"|g" \
            "$GRADLE_FILE"

          find android -name "AndroidManifest.xml" \
            -exec sed -i "s|$OLD_PKG|$NEW_PKG|g" {} \;

          find android \( -name "*.kt" -o -name "*.java" \) \
            | xargs -r sed -i \
                -e "s|package $OLD_PKG|package $NEW_PKG|g" \
                -e "s|import $OLD_PKG|import $NEW_PKG|g"

          OLD_PATH=$(echo "$OLD_PKG" | tr '.' '/')
          NEW_PATH=$(echo "$NEW_PKG" | tr '.' '/')
          for SRC_ROOT in \
              android/app/src/main/kotlin \
              android/app/src/main/java \
              android/app/src/debug/kotlin \
              android/app/src/debug/java; do
            if [ -d "$SRC_ROOT/$OLD_PATH" ]; then
              mkdir -p "$SRC_ROOT/$NEW_PATH"
              mv "$SRC_ROOT/$OLD_PATH/"* "$SRC_ROOT/$NEW_PATH/" 2>/dev/null || true
              rm -rf "$SRC_ROOT/com"
            fi
          done

          find android -name "*.xml" \
            | xargs -r sed -i "s|$OLD_PKG|$NEW_PKG|g"

          sed -i "s|$OLD_PKG|$NEW_PKG|g" pubspec.yaml

          echo "Ō£ģ result:"
          grep -E "applicationId|namespace" "$GRADLE_FILE"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: |
          cd PiliPlus
          flutter pub get

      - name: Build APK
        run: |
          cd PiliPlus
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --no-tree-shake-icons

      - name: Verify APK package name
        run: |
          AAPT=$(find $ANDROID_HOME/build-tools -name "aapt" | sort -V | tail -1)
          $AAPT dump badging \
            PiliPlus/build/app/outputs/flutter-apk/app-release.apk \
            | grep "^package:"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlus-tv.danmaku.bili
          path: PiliPlus/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          cd PiliPlus
          echo "version=$(grep '^version:' pubspec.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ steps.version.outputs.date }}"
          name: "PiliPlus ${{ steps.version.outputs.version }} | tv.danmaku.bili"
          body: |
            Ķć¬ÕŖ©µ×äÕ╗║’╝īÕīģÕÉŹÕĘ▓µö╣õĖ║ `tv.danmaku.bili`
            õĖŖµĖĖńēłµ£¼’╝Ü${{ steps.version.outputs.version }}
            õĖŖµĖĖ SHA’╝Ü${{ needs.check.outputs.upstream_sha }}
            ŌÜĀ’ĖÅ õĖÄÕ«śµ¢╣ÕōöÕō®ÕōöÕō®ÕīģÕÉŹńøĖÕÉī’╝īÕ«ēĶŻģÕēŹĶ»ĘÕģłÕŹĖĶĮĮÕ«śµ¢╣ńēłµ£¼
          files: PiliPlus/build/app/outputs/flutter-apk/app-release.apk

      - name: Save upstream SHA for next run
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "last-built-sha"
          name: "last-built-sha"
          body: ${{ needs.check.outputs.upstream_sha }}
          prerelease: true
